name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test:run
        env:
          DATABASE_URL: "" # PGlite embedded — no Postgres in CI
          VALKEY_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: test_secret_for_ci_only_not_real
          NODE_ENV: test
